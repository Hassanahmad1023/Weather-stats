<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIMBUS Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --text: #1a1200;
    --text-muted: #6b5200;
    --bg: #F5C842;
    --divider: rgba(0,0,0,0.10);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Figtree', sans-serif;
    color: var(--text);
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 52px 0 40px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 0 24px;
    animation: fadeUp 0.45s ease both;
  }
  .date-label {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .city-name {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }
  .icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(0,0,0,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.18); }
  .live-badge {
    background: var(--text);
    color: var(--bg);
    font-size: 10px;
    font-weight: 800;
    padding: 5px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  /* Temp */
  .temp-section {
    padding: 20px 24px 0;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: fadeUp 0.5s ease 0.1s both;
  }
  .sun-icon { margin-top: 10px; flex-shrink: 0; }
  .temp-row { display: flex; align-items: baseline; line-height: 1; }
  .temp-current {
    font-size: 76px;
    font-weight: 900;
    letter-spacing: -5px;
    line-height: 1;
  }
  .temp-unit { font-size: 30px; font-weight: 700; letter-spacing: -1px; margin-top: 8px; }
  .temp-divider { font-size: 22px; font-weight: 400; color: var(--text-muted); margin: 0 5px; margin-top: 16px; }
  .temp-low { font-size: 22px; font-weight: 500; color: var(--text-muted); margin-top: 16px; }
  .condition { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-top: -4px; }

  /* Chart */
  .chart-section {
    padding: 6px 16px 0;
    animation: fadeUp 0.5s ease 0.25s both;
  }
  .chart-svg { width: 100%; height: 180px; overflow: visible; }
  .time-axis { display: flex; justify-content: space-between; padding: 2px 20px 0; }
  .time-tick { font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: center; width: 28px; }

  /* Divider */
  .divider { height: 1px; background: var(--divider); margin: 16px 24px 0; }

  /* Forecast */
  .forecast-section { padding: 4px 0; animation: fadeUp 0.5s ease 0.4s both; }
  .forecast-row {
    padding: 11px 24px;
    border-bottom: 1px solid var(--divider);
    display: flex; flex-direction: column; gap: 2px;
    cursor: pointer; transition: background 0.15s;
  }
  .forecast-row:hover { background: rgba(0,0,0,0.04); }
  .forecast-row:last-child { border-bottom: none; }
  .forecast-day-header { display: flex; align-items: center; gap: 8px; }
  .forecast-dot {
    width: 26px; height: 26px; border-radius: 6px;
    background: rgba(0,0,0,0.10);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800;
  }
  .forecast-date { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .forecast-condition { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; padding-left: 34px; }
  .forecast-sub { font-size: 14px; font-weight: 500; color: var(--text-muted); padding-left: 34px; }

  @keyframes pulse-glow {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.75; transform: scale(1.06); }
  }
  .sun-anim { animation: pulse-glow 3s ease-in-out infinite; transform-origin: center; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="date-label">Saturday, Apr 04</div>
      <div class="city-name">Islamabad</div>
      <div class="header-actions">
        <div class="icon-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1V13M1 7H13" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="icon-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="1" y="3" width="12" height="10" rx="2" stroke="#1a1200" stroke-width="1.8"/>
            <path d="M1 6H13" stroke="#1a1200" stroke-width="1.8"/>
            <path d="M4 1V4M10 1V4" stroke="#1a1200" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="live-badge">LIVE</div>
  </div>

  <div class="temp-section">
    <div class="sun-icon">
      <svg width="34" height="34" viewBox="0 0 32 32" fill="none" class="sun-anim">
        <circle cx="16" cy="16" r="7" fill="#1a1200" opacity="0.85"/>
        <line x1="16" y1="1"  x2="16" y2="5"  stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="16" y1="27" x2="16" y2="31" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="1"  y1="16" x2="5"  y2="16" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="27" y1="16" x2="31" y2="16" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="5.5"  y1="5.5"  x2="8.3"  y2="8.3"  stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="23.7" y1="23.7" x2="26.5" y2="26.5" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="26.5" y1="5.5"  x2="23.7" y2="8.3"  stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="8.3"  y1="23.7" x2="5.5"  y2="26.5" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      </svg>
    </div>
    <div>
      <div class="temp-row">
        <span class="temp-current">22</span>
        <span class="temp-unit">°</span>
        <span class="temp-divider">/</span>
        <span class="temp-low">14°</span>
      </div>
      <div class="condition">Sunny</div>
    </div>
  </div>

  <div class="chart-section">
    <svg class="chart-svg" viewBox="0 0 358 175" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M 10 135 C 25 138, 55 140, 70 138 C 90 136, 100 120, 120 105 C 140 88, 155 55, 179 48 C 203 42, 220 58, 238 72 C 255 85, 268 112, 285 128 C 300 140, 330 142, 348 140"
        fill="none" stroke="#1a1200" stroke-width="2" stroke-opacity="0.7" stroke-linecap="round"/>

      <text x="10"  y="122" text-anchor="middle" font-family="Figtree" font-size="11" font-weight="700" fill="#1a1200" opacity="0.65">16°</text>
      <text x="70"  y="126" text-anchor="middle" font-family="Figtree" font-size="11" font-weight="700" fill="#1a1200" opacity="0.65">14°</text>
      <text x="120" y="93"  text-anchor="middle" font-family="Figtree" font-size="11" font-weight="700" fill="#1a1200" opacity="0.65">18°</text>
      <text x="155" y="42"  text-anchor="middle" font-family="Figtree" font-size="11" font-weight="700" fill="#1a1200" opacity="0.65">22°</text>
      <text x="179" y="35"  text-anchor="middle" font-family="Figtree" font-size="11" font-weight="700" fill="#1a1200" opacity="0.95">27°</text>
      <text x="238" y="58"  text-anchor="middle" font-family="Figtree" font-size="11" font-weight="700" fill="#1a1200" opacity="0.65">25°</text>
      <text x="285" y="115" text-anchor="middle" font-family="Figtree" font-size="11" font-weight="700" fill="#1a1200" opacity="0.65">20°</text>

      <line x1="109" y1="38" x2="109" y2="155" stroke="#1a1200" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="3,4"/>
      <text x="109" y="166" text-anchor="middle" font-family="Figtree" font-size="10" font-weight="700" fill="#1a1200" opacity="0.55">06:24</text>

      <line x1="284" y1="38" x2="284" y2="155" stroke="#1a1200" stroke-width="1.2" stroke-opacity="0.3" stroke-dasharray="3,4"/>
      <text x="284" y="166" text-anchor="middle" font-family="Figtree" font-size="10" font-weight="700" fill="#1a1200" opacity="0.55">18:15</text>

      <line x1="6" y1="150" x2="352" y2="150" stroke="#1a1200" stroke-width="1" stroke-opacity="0.12"/>

      <circle cx="167" cy="51" r="5"  fill="#1a1200" opacity="0.85"/>
      <circle cx="167" cy="51" r="10" fill="#1a1200" opacity="0.10"/>
    </svg>

    <div class="time-axis">
      <span class="time-tick">12</span>
      <span class="time-tick">3</span>
      <span class="time-tick">6</span>
      <span class="time-tick">9</span>
      <span class="time-tick">12</span>
      <span class="time-tick">3</span>
      <span class="time-tick">6</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="forecast-section">
    <div class="forecast-row">
      <div class="forecast-day-header">
        <div class="forecast-dot">SU</div>
        <div class="forecast-date">Sunday, Apr 05</div>
      </div>
      <div class="forecast-condition">25° Sunny & Windy</div>
      <div class="forecast-sub">12° Clear Night</div>
    </div>
    <div class="forecast-row">
      <div class="forecast-day-header">
        <div class="forecast-dot">MO</div>
        <div class="forecast-date">Monday, Apr 06</div>
      </div>
      <div class="forecast-condition">24° Mostly Sunny</div>
      <div class="forecast-sub">13° Clear Night</div>
    </div>
    <div class="forecast-row">
      <div class="forecast-day-header">
        <div class="forecast-dot">TU</div>
        <div class="forecast-date">Tuesday, Apr 07</div>
      </div>
      <div class="forecast-condition">21° Partly Cloudy</div>
      <div class="forecast-sub">11° Cloudy Night</div>
    </div>
    <div class="forecast-row">
      <div class="forecast-day-header">
        <div class="forecast-dot">WE</div>
        <div class="forecast-date">Wednesday, Apr 08</div>
      </div>
      <div class="forecast-condition">19° Chance of Rain</div>
      <div class="forecast-sub">10° Light Showers</div>
    </div>
  </div>

</div>
</body>
</html>
