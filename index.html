<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --text: #1a1200;
    --text-muted: #6b5200;
    --bg: #F5C842;
    --surface: #ffffff;
    --divider: rgba(0,0,0,0.10);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Figtree', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 52px 0 40px;
    position: relative;
  }

  /* ─── In-App Toast Notification (slim pill) ─── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: rgba(26,18,0,0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(245,200,66,0.95);
    padding: 10px 14px 10px 12px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    z-index: 2000;
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1), opacity 0.25s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  .toast-icon { flex-shrink: 0; font-size: 14px; line-height: 1; }
  .toast-body { display: flex; align-items: center; gap: 6px; }
  .toast-title { font-size: 12px; font-weight: 800; }
  .toast-msg { font-size: 11px; font-weight: 500; opacity: 0.7; }
  .toast-action {
    flex-shrink: 0;
    background: rgba(245,200,66,0.15);
    color: rgba(245,200,66,0.95);
    border: 1px solid rgba(245,200,66,0.3);
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    transition: background 0.15s;
    margin-left: 2px;
  }
  .toast-action:hover { background: rgba(245,200,66,0.25); }

  /* ─── Sidebar ─── */
  .sidebar-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 998;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 280px; max-width: 80vw;
    background: var(--surface); z-index: 999;
    transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 4px 0 24px rgba(0,0,0,0.15);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .sidebar.active { transform: translateX(0); }

  .set-header {
    display: flex; align-items: center; gap: 12px; padding: 24px 20px;
    font-size: 20px; font-weight: 800; letter-spacing: 0.5px;
    cursor: pointer; border-bottom: 1px solid var(--divider);
  }
  .set-section-label {
    font-size: 10px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text-muted);
    padding: 18px 20px 8px;
  }
  .set-item {
    padding: 14px 20px; border-bottom: 1px solid var(--divider);
  }
  .set-item-title {
    font-size: 13px; font-weight: 700; color: var(--text);
    margin-bottom: 10px;
  }
  /* Toggle pill group */
  .toggle-group {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .toggle-btn {
    padding: 7px 14px; border-radius: 20px; border: 1.5px solid rgba(0,0,0,0.15);
    background: transparent; color: var(--text-muted);
    font-size: 12px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }
  .toggle-btn:hover { background: rgba(0,0,0,0.05); }
  .toggle-btn.active {
    background: var(--text); color: var(--bg);
    border-color: var(--text);
  }
  .set-action-item {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; border-bottom: 1px solid var(--divider);
    cursor: pointer; transition: background 0.15s;
  }
  .set-action-item:hover { background: rgba(0,0,0,0.03); }
  .set-action-item .set-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .set-action-item .set-sub { font-size: 12px; font-weight: 500; color: rgba(26,18,0,0.6); margin-top: 2px; }
  .set-action-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(0,0,0,0.07); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ─── Search Overlay ─── */
  .search-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 1000;
    padding: 52px 24px 24px;
    display: flex; flex-direction: column; gap: 16px;
    opacity: 0; pointer-events: none;
    transform: translateY(-10px);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .search-overlay.active {
    opacity: 1; pointer-events: auto;
    transform: translateY(0);
  }
  .search-header { display: flex; gap: 12px; align-items: center; }
  .search-input {
    flex: 1; padding: 14px 16px; border-radius: 12px; border: 1.5px solid rgba(0,0,0,0.2);
    background: rgba(255,255,255,0.3); color: var(--text); font-size: 16px;
    font-family: inherit; font-weight: 700; outline: none; transition: background 0.2s;
  }
  .search-input:focus { background: rgba(255,255,255,0.5); }
  .search-input::placeholder { color: var(--text-muted); font-weight: 600; }
  .search-close { font-weight: 800; background: transparent; border: none; cursor: pointer; color: var(--text); font-size: 14px; text-transform: uppercase; }
  .search-results { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .search-item { padding: 16px; border-radius: 12px; background: rgba(0,0,0,0.06); cursor: pointer; transition: background 0.15s; }
  .search-item:hover { background: rgba(0,0,0,0.12); }
  .search-city { font-weight: 800; font-size: 18px; }
  .search-country { font-weight: 600; font-size: 12px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }

  /* ─── Startup location status line ─── */
  .location-status {
    display: none; align-items: center; gap: 8px;
    padding: 0 24px; margin-top: 10px;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    animation: fadeUp 0.4s ease both;
  }
  .location-status.visible { display: flex; }
  .location-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }

  /* ─── Header ─── */
  .header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 0 24px; animation: fadeUp 0.45s ease both;
  }
  .header-left { display: flex; align-items: flex-start; gap: 16px; }
  .menu-btn { margin-top: 4px; }
  .city-name { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
  .header-actions { display: flex; gap: 6px; margin-top: 8px; }
  .icon-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(0,0,0,0.10); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; flex-shrink: 0;
  }
  .icon-btn:hover { background: rgba(0,0,0,0.18); }
  .live-badge {
    background: var(--text); color: var(--bg); font-size: 10px; font-weight: 800;
    padding: 5px 10px; border-radius: 20px; letter-spacing: 0.5px; margin-top: 4px;
    transition: opacity 0.3s, transform 0.3s;
  }
  .live-badge.hidden { opacity: 0; transform: scale(0.9); }

  /* ─── Hero (today only) ─── */
  .temp-section { padding: 24px 24px 0; display: flex; align-items: flex-start; gap: 14px; animation: fadeUp 0.5s ease 0.1s both; }
  .sun-icon { margin-top: 10px; flex-shrink: 0; }
  .temp-row { display: flex; align-items: baseline; line-height: 1; }
  .temp-current { font-size: 76px; font-weight: 900; letter-spacing: -5px; line-height: 1; transition: opacity 0.3s; }
  .temp-unit { font-size: 30px; font-weight: 700; letter-spacing: -1px; margin-top: 8px; }
  .temp-divider { font-size: 22px; font-weight: 400; color: var(--text-muted); margin: 0 5px; margin-top: 16px; }
  .temp-low { font-size: 22px; font-weight: 500; color: var(--text-muted); margin-top: 16px; transition: opacity 0.3s; }
  .condition { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-top: -4px; transition: opacity 0.3s; }

  /* ─── Today's Chart ─── */
  .chart-section { padding: 6px 16px 0; animation: fadeUp 0.5s ease 0.25s both; }
  .chart-svg { width: 100%; height: 180px; overflow: visible; }
  .time-axis { display: flex; justify-content: space-between; padding: 2px 20px 0; }
  .time-tick { font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: center; width: 28px; }

  /* ─── Divider ─── */
  .divider { height: 1px; background: var(--divider); margin: 16px 24px 0; }

  /* ─── Forecast Rows ─── */
  .forecast-section { padding: 4px 0; animation: fadeUp 0.5s ease 0.4s both; }
  .forecast-row {
    border-bottom: 1px solid var(--divider);
    cursor: pointer; transition: background 0.15s;
    overflow: hidden;
  }
  .forecast-row:hover { background: rgba(0,0,0,0.04); }
  .forecast-row:last-child { border-bottom: none; }

  .forecast-row-header {
    padding: 11px 24px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .forecast-day-header { display: flex; align-items: center; gap: 8px; }
  .forecast-dot {
    width: 26px; height: 26px; border-radius: 6px; background: rgba(0,0,0,0.10);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800;
    transition: background 0.2s, color 0.2s;
  }
  .forecast-row.expanded .forecast-dot { background: var(--text); color: var(--bg); }
  .forecast-date { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .forecast-condition { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; padding-left: 34px; }
  .forecast-sub { font-size: 14px; font-weight: 500; color: var(--text-muted); padding-left: 34px; }

  /* ─── Expandable Mini-Chart per forecast day ─── */
  .forecast-expand {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .forecast-row.expanded .forecast-expand {
    max-height: 200px;
  }
  .mini-chart-wrap {
    padding: 4px 16px 12px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s ease 0.1s, transform 0.3s ease 0.1s;
  }
  .forecast-row.expanded .mini-chart-wrap {
    opacity: 1;
    transform: translateY(0);
  }
  .mini-chart-svg { width: 100%; height: 100px; overflow: visible; }
  .mini-time-axis { display: flex; justify-content: space-between; padding: 2px 10px 0; }
  .mini-time-tick { font-size: 10px; font-weight: 600; color: var(--text-muted); text-align: center; width: 28px; }

  @keyframes pulse-glow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.75; transform: scale(1.06); } }
  .sun-anim { animation: pulse-glow 3s ease-in-out infinite; transform-origin: center; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- Toast notification (slim pill, replaces browser alert) -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toast-icon">📍</div>
  <div class="toast-body">
    <span class="toast-title" id="toast-title">Location Denied</span>
    <span class="toast-msg" id="toast-msg"> · Tap Search to find your city</span>
  </div>
  <button class="toast-action" id="toast-action">Search</button>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="set-header" onclick="toggleSidebar()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    SETTINGS
  </div>

  <div class="set-section-label">Units</div>

  <div class="set-item">
    <div class="set-item-title">Temperature</div>
    <div class="toggle-group">
      <button class="toggle-btn active" data-group="temp" data-val="C" onclick="selectToggle(this, 'temp')">°C Celsius</button>
      <button class="toggle-btn" data-group="temp" data-val="F" onclick="selectToggle(this, 'temp')">°F Fahrenheit</button>
    </div>
  </div>

  <div class="set-item">
    <div class="set-item-title">Wind Speed</div>
    <div class="toggle-group">
      <button class="toggle-btn active" data-group="wind" data-val="kmh" onclick="selectToggle(this, 'wind')">km/h</button>
      <button class="toggle-btn" data-group="wind" data-val="mph" onclick="selectToggle(this, 'wind')">mph</button>
      <button class="toggle-btn" data-group="wind" data-val="ms" onclick="selectToggle(this, 'wind')">m/s</button>
    </div>
  </div>

  <div class="set-item">
    <div class="set-item-title">Time Format</div>
    <div class="toggle-group">
      <button class="toggle-btn active" data-group="time" data-val="12" onclick="selectToggle(this, 'time')">12h</button>
      <button class="toggle-btn" data-group="time" data-val="24" onclick="selectToggle(this, 'time')">24h</button>
    </div>
  </div>

  <div class="set-section-label">Location</div>

  <div class="set-action-item" onclick="document.getElementById('btn-gps').click(); toggleSidebar();">
    <div class="set-action-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
    </div>
    <div>
      <div class="set-title">Update Location</div>
      <div class="set-sub">Fetch current GPS position</div>
    </div>
  </div>

  <div class="set-action-item" onclick="openSearch(); toggleSidebar();">
    <div class="set-action-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div>
      <div class="set-title">Search City</div>
      <div class="set-sub">Find weather for any location</div>
    </div>
  </div>
</div>

<div class="search-overlay" id="search-overlay">
  <div class="search-header">
    <input type="text" id="search-input" class="search-input" placeholder="Search City..." autocomplete="off">
    <button class="search-close" onclick="closeSearch()">Cancel</button>
  </div>
  <div class="search-results" id="search-results"></div>
</div>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="icon-btn menu-btn" onclick="toggleSidebar()" aria-label="Menu">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </div>
      <div>
        <div class="city-name" id="display-city">Locating...</div>
        <div class="header-actions">
          <div class="icon-btn" id="btn-gps" title="Use GPS Location">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          </div>
          <div class="icon-btn" onclick="openSearch()" title="Search City">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </div>
        </div>
      </div>
    </div>
    <div class="live-badge hidden" id="live-badge">LIVE</div>
  </div>

  <!-- Location status line (shown on denied/error, hidden once data loads) -->
  <div class="location-status" id="location-status">
    <div class="location-status-dot"></div>
    <span id="location-status-text">Unable to fetch current location </span>
  </div>

  <!-- Hero: Today only -->
  <div class="temp-section" id="hero-section">
    <div class="sun-icon" id="weather-icon">
      <!-- filled by renderTodayHero() -->
    </div>
    <div>
      <div class="temp-row">
        <span class="temp-current" id="temp-current">--</span>
        <span class="temp-unit" id="temp-unit">°</span>
        <span class="temp-divider">/</span>
        <span class="temp-low" id="temp-low">--°</span>
      </div>
      <div class="condition" id="condition">--</div>
    </div>
  </div>

  <!-- Today chart -->
  <div class="chart-section">
    <svg class="chart-svg" id="today-chart-svg" viewBox="0 0 358 160" xmlns="http://www.w3.org/2000/svg">
      <line x1="6" y1="148" x2="352" y2="148" stroke="#1a1200" stroke-width="1" stroke-opacity="0.12"/>
    </svg>
    <div class="time-axis" id="time-axis"></div>
  </div>

  <div class="divider"></div>
  <div class="forecast-section" id="forecast-container"></div>
</div>

<script>
'use strict';

const WX_URL = 'https://api.open-meteo.com/v1/forecast';
const GEO_URL = 'https://geocoding-api.open-meteo.com/v1/search';
const NOM_URL = 'https://nominatim.openstreetmap.org/reverse';

let globalWeatherData = null;
let settings = { temp: 'C', wind: 'kmh', time: '12' };
let expandedRow = null;
let toastTimer = null;

// ─── Toast System (slim pill, replaces all alert() calls) ─────────────────
function showToast(icon, title, msg, actionLabel, actionFn) {
  clearTimeout(toastTimer);
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-msg').textContent = msg ? ' · ' + msg : '';
  const btn = document.getElementById('toast-action');
  if (actionLabel) {
    btn.textContent = actionLabel;
    btn.onclick = () => { hideToast(); if(actionFn) actionFn(); };
    btn.style.display = '';
  } else {
    btn.style.display = 'none';
  }
  document.getElementById('toast').classList.add('show');
  toastTimer = setTimeout(hideToast, 5000);
}
function hideToast() {
  document.getElementById('toast').classList.remove('show');
}

// ─── Sidebar ──────────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('active');
  document.getElementById('sidebar-overlay').classList.toggle('active');
}

// ─── Settings Toggle ──────────────────────────────────────────────────────
function selectToggle(el, group) {
  document.querySelectorAll(`.toggle-btn[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  settings[group] = el.dataset.val;
  if (globalWeatherData) {
    renderTodayHero();
    renderTodayChart();
    renderForecastList();
    if (expandedRow !== null) {
      const rows = document.querySelectorAll('.forecast-row');
      if (rows[expandedRow]) renderMiniChart(rows[expandedRow], expandedRow + 1);
    }
  }
}

// ─── Search ───────────────────────────────────────────────────────────────
function openSearch() {
  document.getElementById('search-overlay').classList.add('active');
  setTimeout(() => document.getElementById('search-input').focus(), 50);
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
}

let searchTimeout;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  const query = e.target.value.trim();
  if (query.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
  searchTimeout = setTimeout(async () => {
    try {
      const d = await jfetch(`${GEO_URL}?name=${encodeURIComponent(query)}&count=5&format=json`);
      const res = d.results || [];
      const html = res.map(r => `
        <div class="search-item" onclick="selectCity(${r.latitude}, ${r.longitude}, '${r.name.replace(/'/g,"\\'")}')">
          <div class="search-city">${r.name}</div>
          <div class="search-country">${r.admin1 ? r.admin1 + ', ' : ''}${r.country || ''}</div>
        </div>`).join('');
      document.getElementById('search-results').innerHTML = html || '<div class="search-item">No results found</div>';
    } catch { document.getElementById('search-results').innerHTML = '<div class="search-item">Error fetching data</div>'; }
  }, 300);
});

function selectCity(lat, lon, name) {
  closeSearch();
  fetchWeather(lat, lon, name);
}

// ─── Weather Helpers ──────────────────────────────────────────────────────
function wmoLabel(code) {
  if (code === 0) return 'Sunny';
  if (code === 1) return 'Mostly Sunny';
  if (code === 2) return 'Partly Cloudy';
  if (code === 3) return 'Overcast';
  if (code <= 48) return 'Fog';
  if (code <= 57) return 'Drizzle';
  if (code <= 67) return 'Rain';
  if (code <= 77) return 'Snow';
  if (code <= 82) return 'Showers';
  if (code <= 86) return 'Snow Showers';
  return 'Storms';
}

// Dynamic weather icon SVGs keyed by condition category
function wmoIcon(code) {
  const c = '#1a1200';
  const op = 'opacity="0.85"';

  // ☀️ Sunny / Clear
  if (code === 0 || code === 1) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none" class="sun-anim">
      <circle cx="16" cy="16" r="7" fill="${c}" ${op}/>

      <line x1="16" y1="27" x2="16" y2="31" stroke="${c}" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  // ⛅ Partly Cloudy
  if (code === 2) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <circle cx="13" cy="12" r="5" fill="${c}" opacity="0.5"/>
      <line x1="13" y1="3" x2="13" y2="6" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      <line x1="5" y1="12" x2="8" y2="12" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      <line x1="6.8" y1="6.8" x2="9" y2="9" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      <line x1="19.2" y1="6.8" x2="17" y2="9" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
      <rect x="5" y="17" width="22" height="10" rx="5" fill="${c}" ${op}/>
      <circle cx="11" cy="17" r="5" fill="${c}" ${op}/>
      <circle cx="20" cy="16" r="6" fill="${c}" ${op}/>
    </svg>`;

  // ☁️ Overcast
  if (code === 3) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="18" width="24" height="10" rx="5" fill="${c}" ${op}/>
      <circle cx="10" cy="18" r="6" fill="${c}" ${op}/>
      <circle cx="20" cy="16" r="7" fill="${c}" ${op}/>
      <circle cx="26" cy="19" r="5" fill="${c}" ${op}/>
    </svg>`;

  // 🌫️ Fog / Mist
  if (code <= 48) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="8" width="24" height="3" rx="1.5" fill="${c}" opacity="0.35"/>
      <rect x="2" y="14" width="28" height="3" rx="1.5" fill="${c}" opacity="0.55"/>
      <rect x="6" y="20" width="20" height="3" rx="1.5" fill="${c}" opacity="0.35"/>
      <rect x="4" y="26" width="24" height="3" rx="1.5" fill="${c}" opacity="0.25"/>
    </svg>`;

  // 🌧️ Drizzle / Light rain
  if (code <= 57) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <rect x="5" y="6" width="22" height="10" rx="5" fill="${c}" ${op}/>
      <circle cx="11" cy="10" r="5" fill="${c}" ${op}/>
      <circle cx="21" cy="8" r="6" fill="${c}" ${op}/>
      <line x1="11" y1="20" x2="9" y2="27" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="18" y1="20" x2="16" y2="27" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </svg>`;

  // 🌧️ Rain
  if (code <= 67) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <rect x="5" y="5" width="22" height="10" rx="5" fill="${c}" ${op}/>
      <circle cx="11" cy="9" r="5" fill="${c}" ${op}/>
      <circle cx="21" cy="7" r="6" fill="${c}" ${op}/>
      <line x1="9" y1="19" x2="7" y2="26" stroke="${c}" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
      <line x1="16" y1="19" x2="14" y2="26" stroke="${c}" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
      <line x1="23" y1="19" x2="21" y2="26" stroke="${c}" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
    </svg>`;

  // ❄️ Snow
  if (code <= 77) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <rect x="5" y="5" width="22" height="9" rx="4.5" fill="${c}" ${op}/>
      <circle cx="11" cy="9" r="5" fill="${c}" ${op}/>
      <circle cx="21" cy="7" r="6" fill="${c}" ${op}/>
      <circle cx="9" cy="22" r="2" fill="${c}" opacity="0.7"/>
      <circle cx="16" cy="25" r="2" fill="${c}" opacity="0.7"/>
      <circle cx="23" cy="21" r="2" fill="${c}" opacity="0.7"/>
      <circle cx="13" cy="20" r="1.5" fill="${c}" opacity="0.5"/>
      <circle cx="20" cy="23" r="1.5" fill="${c}" opacity="0.5"/>
    </svg>`;

  // 🌦️ Showers
  if (code <= 82) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <circle cx="14" cy="11" r="5" fill="${c}" opacity="0.5"/>
      <line x1="14" y1="2" x2="14" y2="5" stroke="${c}" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
      <line x1="7" y1="11" x2="10" y2="11" stroke="${c}" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
      <line x1="8" y1="6" x2="10.2" y2="8.2" stroke="${c}" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
      <rect x="7" y="15" width="18" height="8" rx="4" fill="${c}" ${op}/>
      <circle cx="13" cy="15" r="4.5" fill="${c}" ${op}/>
      <circle cx="21" cy="14" r="5.5" fill="${c}" ${op}/>
      <line x1="12" y1="25" x2="10" y2="31" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
      <line x1="19" y1="25" x2="17" y2="31" stroke="${c}" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
    </svg>`;

  // 🌨️ Snow Showers
  if (code <= 86) return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <rect x="6" y="7" width="20" height="9" rx="4.5" fill="${c}" ${op}/>
      <circle cx="12" cy="10" r="4.5" fill="${c}" ${op}/>
      <circle cx="21" cy="9" r="5.5" fill="${c}" ${op}/>
      <circle cx="9" cy="23" r="2" fill="${c}" opacity="0.65"/>
      <circle cx="16" cy="26" r="2" fill="${c}" opacity="0.65"/>
      <circle cx="23" cy="22" r="2" fill="${c}" opacity="0.65"/>
      <line x1="13" y1="21" x2="11" y2="27" stroke="${c}" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
      <line x1="20" y1="21" x2="18" y2="27" stroke="${c}" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    </svg>`;

  // ⛈️ Storms / Thunderstorm
  return `
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="5" width="24" height="10" rx="5" fill="${c}" ${op}/>
      <circle cx="10" cy="9" r="5" fill="${c}" ${op}/>
      <circle cx="22" cy="7" r="6.5" fill="${c}" ${op}/>
      <polyline points="18,17 13,24 17,24 12,31" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
    </svg>`;
}

function cvtTemp(c) {
  return settings.temp === 'F' ? Math.round(c * 9/5 + 32) : Math.round(c);
}
function tempSuffix() { return settings.temp === 'F' ? '°F' : '°C'; }

function fmtTime(dateStr) {
  const d = new Date(dateStr);
  if (settings.time === '24') {
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  let h = d.getHours() % 12 || 12;
  return `${h}${d.getMinutes() === 0 ? '' : ':' + String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtHour(dateStr) {
  const d = new Date(dateStr);
  if (settings.time === '24') return String(d.getHours()).padStart(2,'0');
  let h = d.getHours() % 12 || 12;
  return String(h);
}

async function jfetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

async function revGeo(lat, lon) {
  try {
    const d = await jfetch(`${NOM_URL}?format=json&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`);
    const a = d.address || {};
    return a.city || a.town || a.village || 'Local Area';
  } catch { return 'Local Area'; }
}

// ─── Fetch Weather ─────────────────────────────────────────────────────────
async function fetchWeather(lat, lon, cityName) {
  document.getElementById('display-city').textContent = cityName;
  const params = new URLSearchParams({
    latitude: lat,
    longitude: lon,
    current: 'temperature_2m,weather_code,apparent_temperature',
    hourly: 'temperature_2m,weather_code',
    daily: 'weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset',
    timezone: 'auto',
    forecast_days: 7
  });
  try {
    globalWeatherData = await jfetch(`${WX_URL}?${params}`);
    expandedRow = null;
    hideLocationStatus();
    renderTodayHero();
    renderTodayChart();
    renderForecastList();
  } catch (e) {
    showToast('⚠️', 'Network Error', 'Failed to fetch weather data.', null, null);
  }
}

// ─── Render Today Hero ─────────────────────────────────────────────────────
function renderTodayHero() {
  const d = globalWeatherData;
  document.getElementById('temp-current').textContent = cvtTemp(d.current.temperature_2m);
  document.getElementById('temp-unit').textContent = '°';
  document.getElementById('temp-low').textContent = cvtTemp(d.daily.temperature_2m_min[0]) + '°';
  document.getElementById('live-badge').classList.remove('hidden');

  // Use hourly weather_code at current hour — more accurate than daily current
  const now = new Date();
  const nowHourIdx = d.hourly.time.findIndex(t => new Date(t).getTime() > now.getTime()) - 1;
  const currentCode = (nowHourIdx >= 0 && d.hourly.weather_code)
    ? d.hourly.weather_code[nowHourIdx]
    : d.current.weather_code;

  document.getElementById('condition').textContent = wmoLabel(currentCode);
  document.getElementById('weather-icon').innerHTML = wmoIcon(currentCode);
}

// ─── Build SVG Chart Path (shared by today + mini) ────────────────────────
function buildChartPath(temps, svgW, svgH, padX, padY) {
  const minT = Math.min(...temps);
  const maxT = Math.max(...temps);
  const range = maxT - minT || 1;
  const pts = temps.map((t, i) => {
    const x = padX + (i / (temps.length - 1)) * (svgW - padX * 2);
    const y = svgH - padY - ((t - minT) / range) * (svgH - padY * 2);
    return [x, y];
  });
  // Smooth curve via cubic bezier
  let path = `M ${pts[0][0]} ${pts[0][1]}`;
  for (let i = 1; i < pts.length; i++) {
    const cp1x = pts[i-1][0] + (pts[i][0] - pts[i-1][0]) * 0.4;
    const cp1y = pts[i-1][1];
    const cp2x = pts[i][0] - (pts[i][0] - pts[i-1][0]) * 0.4;
    const cp2y = pts[i][1];
    path += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${pts[i][0]} ${pts[i][1]}`;
  }
  return { path, pts, minT, maxT };
}

// ─── Render Today Chart ───────────────────────────────────────────────────
function renderTodayChart() {
  const d = globalWeatherData;
  const svg = document.getElementById('today-chart-svg');
  const timeAxis = document.getElementById('time-axis');

  const today = d.daily.time[0];
  const startIdx = d.hourly.time.findIndex(t => t.startsWith(today));
  const now = new Date();

  // 7 points: hours 0,3,6,9,12,15,18 of the day
  const step = 3;
  const hours = [];
  for (let i = 0; i < 7; i++) hours.push(startIdx + i * step);

  const temps = hours.map(idx => cvtTemp(d.hourly.temperature_2m[idx]));
  const timeLabels = hours.map(idx => fmtHour(d.hourly.time[idx]));

  const { path, pts, minT, maxT } = buildChartPath(temps, 358, 148, 20, 20);
  const range = maxT - minT || 1;

  // ── Live dot: map current time precisely to chart x-axis ──
  // Chart spans from chartHour[0] to chartHour[6] (0h to 18h of today by default)
  const chartStartTime = new Date(d.hourly.time[hours[0]]);
  const chartEndTime   = new Date(d.hourly.time[hours[hours.length - 1]]);
  const totalMs = chartEndTime - chartStartTime;
  const elapsedMs = Math.max(0, Math.min(totalMs, now - chartStartTime));
  const nowFrac = elapsedMs / totalMs;                    // 0–1 across chart width
  const liveX = 20 + nowFrac * (358 - 40);

  // Y: interpolate temperature at current time between surrounding hourly points
  const nowHourIdx = d.hourly.time.findIndex(t => new Date(t).getTime() > now.getTime()) - 1;
  const clampedIdx = Math.max(hours[0], Math.min(hours[hours.length-1], nowHourIdx));
  const nowTemp = cvtTemp(d.hourly.temperature_2m[clampedIdx]);
  const liveY = 148 - 20 - ((nowTemp - minT) / range) * (148 - 40);

  // Sunrise / sunset lines positioned by time-of-day fraction
  const sr = new Date(d.daily.sunrise[0]);
  const ss = new Date(d.daily.sunset[0]);
  const xByTime = (t) => {
    const frac = Math.max(0, Math.min(1, (t - chartStartTime) / totalMs));
    return 20 + frac * (358 - 40);
  };
  const srX = xByTime(sr);
  const ssX = xByTime(ss);

  svg.innerHTML = `
    <line x1="6" y1="148" x2="352" y2="148" stroke="#1a1200" stroke-width="1" stroke-opacity="0.12"/>
    <line x1="${srX}" y1="14" x2="${srX}" y2="148" stroke="#1a1200" stroke-width="1.2" stroke-opacity="0.22" stroke-dasharray="3,4"/>
    <text x="${srX}" y="162" text-anchor="middle" font-family="Figtree" font-size="10" font-weight="700" fill="#1a1200" opacity="0.45">${fmtTime(d.daily.sunrise[0])}</text>
    <line x1="${ssX}" y1="14" x2="${ssX}" y2="148" stroke="#1a1200" stroke-width="1.2" stroke-opacity="0.22" stroke-dasharray="3,4"/>
    <text x="${ssX}" y="162" text-anchor="middle" font-family="Figtree" font-size="10" font-weight="700" fill="#1a1200" opacity="0.45">${fmtTime(d.daily.sunset[0])}</text>
    <path d="${path}" fill="none" stroke="#1a1200" stroke-width="2.2" stroke-opacity="0.75" stroke-linecap="round"/>
    ${pts.map((p,i) => `<text x="${p[0]}" y="${p[1] - 8}" text-anchor="middle" font-family="Figtree" font-size="11" font-weight="700" fill="#1a1200" opacity="${i===3?'0.95':'0.6'}">${temps[i]}°</text>`).join('')}
    <circle cx="${liveX}" cy="${liveY}" r="10" fill="#1a1200" opacity="0.08"/>
    <circle cx="${liveX}" cy="${liveY}" r="5" fill="#1a1200" opacity="0.85"/>
  `;

  timeAxis.innerHTML = timeLabels.map(l => `<span class="time-tick">${l}</span>`).join('');
}

// ─── Render Forecast List ─────────────────────────────────────────────────
function renderForecastList() {
  const d = globalWeatherData;
  const container = document.getElementById('forecast-container');
  container.innerHTML = '';
  const daysShort = ['SU','MO','TU','WE','TH','FR','SA'];

  for (let i = 1; i <= 5; i++) {
    const fDate = new Date(d.daily.time[i]);
    const row = document.createElement('div');
    row.className = 'forecast-row';
    row.dataset.dayIdx = i;

    row.innerHTML = `
      <div class="forecast-row-header">
        <div class="forecast-day-header">
          <div class="forecast-dot">${i === 1 ? 'TM' : daysShort[fDate.getDay()]}</div>
          <div class="forecast-date">${fDate.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'2-digit'})}</div>
        </div>
        <div class="forecast-condition">${cvtTemp(d.daily.temperature_2m_max[i])}° ${wmoLabel(d.daily.weather_code[i])}</div>
        <div class="forecast-sub">${cvtTemp(d.daily.temperature_2m_min[i])}° Low</div>
      </div>
      <div class="forecast-expand">
        <div class="mini-chart-wrap">
          <svg class="mini-chart-svg" viewBox="0 0 320 90" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="mini-time-axis"></div>
        </div>
      </div>
    `;

    row.addEventListener('click', () => toggleForecastRow(row, i));
    container.appendChild(row);
  }
}

// ─── Toggle Expand/Collapse Forecast Row ──────────────────────────────────
function toggleForecastRow(row, dayIdx) {
  const isOpen = row.classList.contains('expanded');

  // Close any open row
  document.querySelectorAll('.forecast-row.expanded').forEach(r => {
    r.classList.remove('expanded');
  });

  if (!isOpen) {
    row.classList.add('expanded');
    expandedRow = dayIdx - 1;
    renderMiniChart(row, dayIdx);
  } else {
    expandedRow = null;
  }
}

// ─── Render Mini Chart inside a forecast row ──────────────────────────────
function renderMiniChart(row, dayIdx) {
  const d = globalWeatherData;
  const svg = row.querySelector('.mini-chart-svg');
  const axis = row.querySelector('.mini-time-axis');
  const today = d.daily.time[dayIdx];
  const startIdx = d.hourly.time.findIndex(t => t.startsWith(today));

  const step = 3;
  const hours = [];
  for (let i = 0; i < 7; i++) hours.push(startIdx + i * step);

  const temps = hours.map(idx => cvtTemp(d.hourly.temperature_2m[idx]));
  const timeLabels = hours.map(idx => fmtHour(d.hourly.time[idx]));

  const { path, pts } = buildChartPath(temps, 320, 82, 16, 14);

  svg.innerHTML = `
    <line x1="4" y1="82" x2="316" y2="82" stroke="#1a1200" stroke-width="1" stroke-opacity="0.12"/>
    <path d="${path}" fill="none" stroke="#1a1200" stroke-width="2" stroke-opacity="0.7" stroke-linecap="round"/>
    ${pts.map((p,i) => `<text x="${p[0]}" y="${p[1]-6}" text-anchor="middle" font-family="Figtree" font-size="10" font-weight="700" fill="#1a1200" opacity="0.65">${temps[i]}°</text>`).join('')}
  `;
  axis.innerHTML = timeLabels.map(l => `<span class="mini-time-tick">${l}</span>`).join('');
}

// ─── Location Status (inline, no toast on startup) ────────────────────────
function showLocationStatus(msg) {
  const el = document.getElementById('location-status');
  document.getElementById('location-status-text').textContent = msg;
  el.classList.add('visible');
}
function hideLocationStatus() {
  document.getElementById('location-status').classList.remove('visible');
}

// ─── GPS Location ─────────────────────────────────────────────────────────
let isFirstLoad = true;
document.getElementById('btn-gps').addEventListener('click', () => {
  document.getElementById('display-city').textContent = 'Locating...';
  hideLocationStatus();
  if (!navigator.geolocation) {
    document.getElementById('display-city').textContent = 'Weather';
    showLocationStatus('Location not supported — search a city to get started');
    if (isFirstLoad) { isFirstLoad = false; openSearch(); }
    return;
  }
  navigator.geolocation.getCurrentPosition(
    async pos => {
      isFirstLoad = false;
      const loc = await revGeo(pos.coords.latitude, pos.coords.longitude);
      fetchWeather(pos.coords.latitude, pos.coords.longitude, loc);
    },
    (err) => {
      document.getElementById('display-city').textContent = 'Weather';
      if (err.code === 1) {
        showLocationStatus('Unable to fetch current location — search a city to get started');
        if (isFirstLoad) { isFirstLoad = false; openSearch(); }
      } else {
        showLocationStatus('Location unavailable — search a city to get started');
        if (isFirstLoad) { isFirstLoad = false; openSearch(); }
      }
    },
    { timeout: 8000, maximumAge: 60000 }
  );
});

// ─── Init ─────────────────────────────────────────────────────────────────
window.onload = () => document.getElementById('btn-gps').click();
</script>
